<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gradMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="gradRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gradInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="gradViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; filter: url(#softShadow); }
      .label { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
      .sub { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #64748b; }
      .num { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 800; fill: #ffffff; }
      .caption { font-family: Inter, Arial, sans-serif; font-size: 15px; fill: #475569; }
      .axis { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .thin { stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="50" y="44" class="label" font-size="24">Usage Statistics Icon Concepts</text>
  <text x="50" y="68" class="sub">Ten independent options for preview only. Not applied to the app.</text>

  <!-- 01 Minimal Bars -->
  <g transform="translate(50 90)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#111827"/>
    <text x="37" y="43" class="num">01</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#e7edf5"/>
      <rect x="36" y="30" width="52" height="60" rx="11" fill="#1f2937"/>
      <rect x="49" y="64" width="7" height="17" rx="3.5" fill="#ffffff"/>
      <rect x="60" y="53" width="7" height="28" rx="3.5" fill="#ffffff"/>
      <rect x="71" y="41" width="7" height="40" rx="3.5" fill="#ffffff"/>
    </g>
    <text x="24" y="242" class="label">Minimal Bars</text>
    <text x="24" y="270" class="caption">Close to current Echo style,</text>
    <text x="24" y="292" class="caption">but lighter and smaller.</text>
  </g>

  <!-- 02 Pulse Ring -->
  <g transform="translate(350 90)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#0f766e"/>
    <text x="37" y="43" class="num">02</text>
    <g transform="translate(70 82)">
      <circle cx="60" cy="60" r="60" fill="#ecfeff"/>
      <circle cx="60" cy="60" r="42" fill="none" stroke="#99f6e4" stroke-width="12"/>
      <path d="M60 18 A42 42 0 0 1 101 70" fill="none" stroke="url(#gradBlue)" stroke-width="12" stroke-linecap="round"/>
      <rect x="42" y="54" width="8" height="25" rx="4" fill="#0f766e"/>
      <rect x="56" y="41" width="8" height="38" rx="4" fill="#0f766e"/>
      <rect x="70" y="30" width="8" height="49" rx="4" fill="#0f766e"/>
    </g>
    <text x="24" y="242" class="label">Pulse Ring</text>
    <text x="24" y="270" class="caption">Shows usage percentage with</text>
    <text x="24" y="292" class="caption">a compact progress ring.</text>
  </g>

  <!-- 03 Trend Spark -->
  <g transform="translate(650 90)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#2563eb"/>
    <text x="37" y="43" class="num">03</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#eff6ff"/>
      <path d="M31 82 L50 65 L65 72 L88 42" class="thin" stroke="#2563eb" marker-end="url(#arrowHead)"/>
      <circle cx="31" cy="82" r="6" fill="#93c5fd"/>
      <circle cx="50" cy="65" r="6" fill="#60a5fa"/>
      <circle cx="65" cy="72" r="6" fill="#38bdf8"/>
      <circle cx="88" cy="42" r="7" fill="#2563eb"/>
      <path d="M29 91 H92" class="axis"/>
    </g>
    <text x="24" y="242" class="label">Trend Spark</text>
    <text x="24" y="270" class="caption">Good for growth, history,</text>
    <text x="24" y="292" class="caption">and token usage trends.</text>
  </g>

  <!-- 04 Token Stack -->
  <g transform="translate(950 90)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#be123c"/>
    <text x="37" y="43" class="num">04</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#fff1f2"/>
      <ellipse cx="60" cy="37" rx="34" ry="12" fill="#fb7185"/>
      <path d="M26 37 V78 C26 84 41 91 60 91 C79 91 94 84 94 78 V37" fill="#ffe4e6"/>
      <path d="M26 58 C26 65 41 71 60 71 C79 71 94 65 94 58" fill="none" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
      <path d="M26 78 C26 85 41 91 60 91 C79 91 94 85 94 78" fill="none" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
      <rect x="48" y="34" width="7" height="26" rx="3.5" fill="#ffffff"/>
      <rect x="60" y="28" width="7" height="32" rx="3.5" fill="#ffffff"/>
      <rect x="72" y="41" width="7" height="19" rx="3.5" fill="#ffffff"/>
    </g>
    <text x="24" y="242" class="label">Token Stack</text>
    <text x="24" y="270" class="caption">Emphasizes token totals,</text>
    <text x="24" y="292" class="caption">cost, and accumulated usage.</text>
  </g>

  <!-- 05 Heat Grid -->
  <g transform="translate(1250 90)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#7c2d12"/>
    <text x="37" y="43" class="num">05</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#fff7ed"/>
      <g transform="translate(31 30)">
        <rect width="16" height="16" rx="4" fill="#fed7aa"/>
        <rect x="22" width="16" height="16" rx="4" fill="#fdba74"/>
        <rect x="44" width="16" height="16" rx="4" fill="#fb923c"/>
        <rect y="22" width="16" height="16" rx="4" fill="#fdba74"/>
        <rect x="22" y="22" width="16" height="16" rx="4" fill="#fb923c"/>
        <rect x="44" y="22" width="16" height="16" rx="4" fill="#ea580c"/>
        <rect y="44" width="16" height="16" rx="4" fill="#fb923c"/>
        <rect x="22" y="44" width="16" height="16" rx="4" fill="#ea580c"/>
        <rect x="44" y="44" width="16" height="16" rx="4" fill="#9a3412"/>
      </g>
    </g>
    <text x="24" y="242" class="label">Heat Grid</text>
    <text x="24" y="270" class="caption">Works for daily activity,</text>
    <text x="24" y="292" class="caption">frequency, and intensity.</text>
  </g>

  <!-- 06 Compass Analytics -->
  <g transform="translate(50 480)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#0369a1"/>
    <text x="37" y="43" class="num">06</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#f0f9ff"/>
      <circle cx="60" cy="60" r="41" fill="none" stroke="#bae6fd" stroke-width="10"/>
      <path d="M60 20 L75 72 L60 62 L45 72 Z" fill="#0284c7"/>
      <circle cx="60" cy="60" r="7" fill="#0f172a"/>
      <circle cx="38" cy="81" r="5" fill="#38bdf8"/>
      <circle cx="84" cy="35" r="5" fill="#38bdf8"/>
    </g>
    <text x="24" y="242" class="label">Compass Analytics</text>
    <text x="24" y="270" class="caption">Feels like a navigation tool</text>
    <text x="24" y="292" class="caption">for conversation metrics.</text>
  </g>

  <!-- 07 Memory Ledger -->
  <g transform="translate(350 480)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#0f172a"/>
    <text x="37" y="43" class="num">07</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#f1f5f9"/>
      <rect x="34" y="24" width="55" height="72" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <path d="M47 43 H77 M47 58 H72 M47 73 H67" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
      <path d="M35 35 L25 35 C20 35 17 38 17 43 V86 C17 91 20 94 25 94 H72" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
      <circle cx="88" cy="82" r="18" fill="url(#gradMint)"/>
      <path d="M80 82 L86 88 L97 74" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="24" y="242" class="label">Memory Ledger</text>
    <text x="24" y="270" class="caption">Links statistics with memory,</text>
    <text x="24" y="292" class="caption">summary, and context records.</text>
  </g>

  <!-- 08 Flow Columns -->
  <g transform="translate(650 480)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#5b21b6"/>
    <text x="37" y="43" class="num">08</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#f5f3ff"/>
      <rect x="28" y="69" width="12" height="24" rx="6" fill="#a78bfa"/>
      <rect x="47" y="53" width="12" height="40" rx="6" fill="#8b5cf6"/>
      <rect x="66" y="38" width="12" height="55" rx="6" fill="#7c3aed"/>
      <rect x="85" y="25" width="12" height="68" rx="6" fill="#4c1d95"/>
      <path d="M30 34 C48 28 57 40 72 31 C82 26 89 21 97 20" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="24" y="242" class="label">Flow Columns</text>
    <text x="24" y="270" class="caption">Readable at small size,</text>
    <text x="24" y="292" class="caption">with a usage-flow accent.</text>
  </g>

  <!-- 09 Context Gauge -->
  <g transform="translate(950 480)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#166534"/>
    <text x="37" y="43" class="num">09</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#f0fdf4"/>
      <path d="M28 79 A37 37 0 0 1 92 79" fill="none" stroke="#bbf7d0" stroke-width="13" stroke-linecap="round"/>
      <path d="M28 79 A37 37 0 0 1 77 44" fill="none" stroke="#22c55e" stroke-width="13" stroke-linecap="round"/>
      <path d="M60 78 L82 55" stroke="#14532d" stroke-width="6" stroke-linecap="round"/>
      <circle cx="60" cy="78" r="7" fill="#14532d"/>
      <rect x="39" y="88" width="43" height="8" rx="4" fill="#86efac"/>
    </g>
    <text x="24" y="242" class="label">Context Gauge</text>
    <text x="24" y="270" class="caption">Best fit if the icon should</text>
    <text x="24" y="292" class="caption">hint at budget percentage.</text>
  </g>

  <!-- 10 Echo Wave -->
  <g transform="translate(1250 480)">
    <rect class="card" width="260" height="320" rx="16"/>
    <circle cx="42" cy="38" r="15" fill="#334155"/>
    <text x="37" y="43" class="num">10</text>
    <g transform="translate(70 82)">
      <rect width="120" height="120" rx="30" fill="#f8fafc"/>
      <path d="M24 66 C38 38 50 94 64 66 C78 38 90 94 104 66" fill="none" stroke="url(#gradViolet)" stroke-width="7" stroke-linecap="round"/>
      <rect x="35" y="76" width="9" height="20" rx="4.5" fill="#0f172a"/>
      <rect x="56" y="67" width="9" height="29" rx="4.5" fill="#334155"/>
      <rect x="77" y="56" width="9" height="40" rx="4.5" fill="#64748b"/>
      <circle cx="61" cy="33" r="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <path d="M55 33 H67" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
    </g>
    <text x="24" y="242" class="label">Echo Wave</text>
    <text x="24" y="270" class="caption">Keeps the Echo identity while</text>
    <text x="24" y="292" class="caption">still reading as statistics.</text>
  </g>
</svg>
